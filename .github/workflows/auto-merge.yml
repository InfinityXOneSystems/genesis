name: Auto-Merge Autonomous PRs

on:
  pull_request:
    types: [labeled, synchronize]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: 🤖 Auto-Merge Verified PRs
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' && 
      contains(github.event.pull_request.labels.*.name, 'autonomous-verified')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check PR Status
        id: pr-status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            // Check if PR has the autonomous-verified label
            const hasLabel = pr.labels.some(label => label.name === 'autonomous-verified');
            
            if (!hasLabel) {
              console.log('PR does not have autonomous-verified label');
              return false;
            }
            
            // Check if PR is mergeable
            if (!pr.mergeable) {
              console.log('PR is not mergeable (conflicts)');
              return false;
            }
            
            // Get check runs
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });
            
            // Check if all required checks passed
            const failedChecks = checkRuns.check_runs.filter(
              check => check.conclusion === 'failure' || check.conclusion === 'cancelled'
            );
            
            if (failedChecks.length > 0) {
              console.log('Some checks failed:', failedChecks.map(c => c.name));
              return false;
            }
            
            console.log('All checks passed, PR is ready to merge');
            return true;
      
      - name: Wait for CI to Complete
        if: steps.pr-status.outputs.result == 'true'
        run: |
          echo "Waiting for CI to complete..."
          sleep 30
      
      - name: Enable Auto-Merge
        if: steps.pr-status.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                merge_method: 'squash',
                commit_title: `🤖 Auto-merge: ${context.payload.pull_request.title}`,
                commit_message: 'Automatically merged by Genesis autonomous system after validation.'
              });
              
              console.log('✅ PR merged successfully');
              
              // Add comment to PR
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '🤖 **Autonomous Merge Complete**\n\nThis PR has been automatically merged by the Genesis system after passing all validation checks.\n\n✅ All CI checks passed\n✅ Code review approved\n✅ Autonomous verification complete'
              });
              
            } catch (error) {
              console.error('Failed to merge PR:', error);
              
              // Add comment about failure
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ **Auto-merge failed**\n\nError: ${error.message}\n\nPlease merge manually or investigate the issue.`
              });
              
              throw error;
            }
      
      - name: Update Manifest After Merge
        if: steps.pr-status.outputs.result == 'true'
        run: |
          echo "PR merged, Genesis epoch incremented"

  notify-status:
    name: 📢 Notify Merge Status
    runs-on: ubuntu-latest
    needs: [auto-merge]
    if: always()
    
    steps:
      - name: Report Status
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.auto-merge.result }}';
            const emoji = status === 'success' ? '✅' : '❌';
            
            console.log(`${emoji} Auto-merge job ${status}`);
