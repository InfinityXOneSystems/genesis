name: Genesis Autonomous Loop

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Target threshold (e.g., 1.2 for 20% improvement)'
        required: false
        default: '1.2'
      max_iterations:
        description: 'Max iterations (0 for unlimited, blank for default 50)'
        required: false
        default: ''
      infinite_mode:
        description: 'Enable infinite mode (continuous improvement without constraints)'
        required: false
        type: boolean
        default: false

jobs:
  autonomous-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run Repository Scan
        run: |
          genesis scan --repo-path . --output ./analysis/global_analysis.json
      
      - name: Run Benchmarks
        run: |
          genesis benchmark --output ./benchmarks/results.json
      
      - name: Run Autonomous Loop
        run: |
          LOOP_CMD="genesis loop --repo-path . --threshold ${{ inputs.threshold || '1.2' }}"
          
          if [ "${{ inputs.max_iterations }}" != "" ]; then
            LOOP_CMD="$LOOP_CMD --max-iterations ${{ inputs.max_iterations }}"
          fi
          
          if [ "${{ inputs.infinite_mode }}" == "true" ]; then
            LOOP_CMD="$LOOP_CMD --infinite"
            echo "🚀 Running in INFINITE MODE - will use full workflow timeout"
          fi
          
          echo "Executing: $LOOP_CMD"
          eval $LOOP_CMD
      
      - name: Upload Results
        uses: actions/upload-artifact@v3
        with:
          name: autonomous-loop-results
          path: |
            ./output/
            ./analysis/
            ./benchmarks/
      
      - name: Create Improvement PR
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: autonomous improvements from loop iteration'
          title: 'Autonomous Improvements'
          body: |
            ## Autonomous Loop Results
            
            This PR contains improvements generated by the autonomous loop.
            
            - Scanned repository for analysis
            - Generated improvement proposals
            - Validated changes in sandbox
            - Applied safe improvements
            
            Review the changes and merge if approved.
          branch: autonomous/improvements-${{ github.run_number }}
          delete-branch: true
