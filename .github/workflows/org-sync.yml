# Workflow to sync organization repositories

name: Org Sync

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repositories
        uses: actions/checkout@v2

      - name: Push mirror to infinity-factory
        env:
          MIRROR_TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}
        run: |
          git config --global user.name  "Genesis Bot"
          git config --global user.email "genesis-bot@infinityxonesystems.com"

          MIRROR_URL="https://x-access-token:${MIRROR_TOKEN}@github.com/Infinity-X-One-Systems/infinity-factory.git"

          # Push all refs; --mirror keeps branches and tags in sync
          git push --mirror "$MIRROR_URL"
          echo "✅ Mirror push to Infinity-X-One-Systems/infinity-factory complete"