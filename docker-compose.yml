version: '3.8'

services:
  genesis:
    build: .
    container_name: genesis-main
    volumes:
      - ./src:/app/src
      - ./output:/app/output
      - ./analysis:/app/analysis
      - ./benchmarks:/app/benchmarks
    environment:
      - GENESIS_ENV=development
      - PYTHONUNBUFFERED=1
    command: genesis run --repo-path /app
    networks:
      - genesis-network

  genesis-loop:
    build: .
    container_name: genesis-loop
    volumes:
      - ./src:/app/src
      - ./output:/app/output
    environment:
      - GENESIS_ENV=production
      - PYTHONUNBUFFERED=1
    command: genesis loop --repo-path /app --threshold 1.2
    networks:
      - genesis-network
    depends_on:
      - genesis

  redis:
    image: redis:7-alpine
    container_name: genesis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - genesis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: genesis-postgres
    environment:
      POSTGRES_DB: genesis
      POSTGRES_USER: genesis
      POSTGRES_PASSWORD: genesis_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - genesis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genesis"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  genesis-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
